<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goro Charts · Dual Instrument Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./demo/styles.css" />
  </head>
  <body class="dark">
    <svg class="grain">
      <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" /></filter>
      <rect width="100%" height="100%" filter="url(#n)" />
    </svg>

    <div class="wrap">
      <header>
        <div class="brand">
          <div class="mark"><span class="sq"></span>GORO<b>&#9656;</b>CHARTS</div>
        </div>
        <span class="tag">Two independent instruments &middot; compare side by side</span>
        <span class="ver">v1.9.0</span>
        <div class="spacer"></div>
        <div class="hlinks">
          <span class="iconbtn" id="copyAB" title="Clone panel A config into B">A &rarr; B</span>
          <span class="iconbtn" id="copyBA" title="Clone panel B config into A">B &rarr; A</span>
          <span class="iconbtn on" id="syncBtn" title="Link the two crosshairs">&#9741; Sync</span>
          <a href="https://github.com/stefanelloisaac/goro-charts" target="_blank" rel="noopener">GitHub</a>
          <span class="iconbtn" id="themeBtn">&#9788; Theme</span>
        </div>
      </header>

      <div class="stage" id="stage"></div>

      <div class="foot">
        Built with
        <a href="https://github.com/stefanelloisaac/goro-charts" target="_blank" rel="noopener">goro-charts</a> &mdash;
        each panel is a separate live instance of the real library, independently configurable.
      </div>
    </div>

    <script type="module" src="./demo/main.js"></script>
  </body>
</html>
