name: Release

# Publishes to npm — triggered MANUALLY (never runs on its own).
#
# How to publish, once you're ready:
#   1. Create an npm automation token: npmjs.com > Access Tokens > Generate (Automation).
#   2. Add it as a GitHub repo secret named NPM_TOKEN
#      (Settings > Secrets and variables > Actions > New repository secret).
#   3. Go to the repo's Actions tab > Release > "Run workflow".
#
# Provenance (--provenance) attaches a signed build attestation via GitHub OIDC,
# so the npm page shows a verified "Published from GitHub Actions" badge.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint, typecheck, test)
        run: |
          npm run lint
          npm run typecheck
          npm run test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
