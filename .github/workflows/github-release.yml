name: GitHub Release

# Creates/updates a GitHub Release from CHANGELOG.md when a version tag is
# pushed. The tag must follow the package convention: v1.2.3.
#
# Manual backfill:
#   Actions > GitHub Release > Run workflow > tag = v1.2.0

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish as a GitHub Release (example: v1.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag '$tag'. Expected v1.2.3 or v1.2.3-beta.1." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Extract release notes from CHANGELOG.md
        shell: bash
        run: |
          version="${{ steps.tag.outputs.version }}"

          awk -v heading="## [$version]" '
            index($0, heading) == 1 { found = 1; next }
            found && index($0, "## [") == 1 { exit }
            found { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/N;/^\n$/D' > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG.md section found for [$version]." >&2
            echo "Expected a heading like: ## [$version]" >&2
            exit 1
          fi

          echo "Release notes extracted for $version:"
          cat release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            if [[ "$TAG" == *-* ]]; then
              gh release edit "$TAG" --title "$TAG" --notes-file release-notes.md --prerelease
            else
              gh release edit "$TAG" --title "$TAG" --notes-file release-notes.md --latest
            fi
          else
            if [[ "$TAG" == *-* ]]; then
              gh release create "$TAG" --title "$TAG" --notes-file release-notes.md --verify-tag --prerelease
            else
              gh release create "$TAG" --title "$TAG" --notes-file release-notes.md --verify-tag --latest
            fi
          fi
